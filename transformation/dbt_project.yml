name: 'transformation'
version: '1.0.0'
profile: 'transformation'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Cost control: dev uses a recent-date window; prod runs full history.
# Override at runtime: dbt run --vars '{dev_start_date: "2024-01-01"}'
vars:
  dev_start_date: '2023-01-01'
  specialist_min_answers: 10
  specialist_top_n: 10
  hidden_gem_score_percentile: 0.75
  hidden_gem_view_percentile: 0.25

models:
  transformation:
    staging:
      stackoverflow:
        +materialized: view
        +schema: stg_stackoverflow
    intermediate:
      stackoverflow:
        +materialized: view
        +schema: int_stackoverflow
    warehouse:
      stackoverflow:
        +schema: wh_stackoverflow
        +materialized: "{{ 'view' if target.name == 'dev' else 'table' }}"
    marts:
      stackoverflow:
        +schema: mart_stackoverflow
        +materialized: "{{ 'view' if target.name == 'dev' else 'table' }}"
        dimensions:
          +schema: mart_stackoverflow
        facts:
          +schema: mart_stackoverflow
        bridge:
          +schema: mart_stackoverflow

seeds:
  transformation:
    +schema: mart_stackoverflow
